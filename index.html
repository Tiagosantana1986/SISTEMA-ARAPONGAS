<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Completo de Competições Esportivas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1e3c72;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-tab:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 24px;
            color: #1e3c72;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #2a5298;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #2a5298;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .hidden {
            display: none !important;
        }

        .group-container {
            margin-bottom: 30px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
        }

        .group-title {
            font-size: 20px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 15px;
        }

        .bracket {
            display: flex;
            overflow-x: auto;
            padding: 20px 0;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 200px;
        }

        .match-bracket {
            background: #f8f9fa;
            border: 2px solid #2a5298;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .team-bracket {
            padding: 8px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            text-align: center;
        }

        .team-bracket.winner {
            background: #d1fae5;
            border: 2px solid #10b981;
        }

        .score-input {
            width: 60px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .match-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-name {
            font-weight: 600;
            font-size: 18px;
        }

        .match-score {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .match-score span {
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
        }

        .pots-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .pot {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }

        .pot-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #1e3c72;
        }

        .pot-teams {
            min-height: 100px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .drag-drop {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 10px;
            min-height: 50px;
        }

        .team-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: move;
        }

        .team-item.dragging {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏆 Sistema Completo de Competições Esportivas</h1>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="showTab('competitions')">📋 Competições</button>
                <button class="nav-tab" onclick="showTab('teams')">⚽ Times</button>
                <button class="nav-tab" onclick="showTab('groups')">📊 Grupos</button>
                <button class="nav-tab" onclick="showTab('matches')">🎮 Partidas</button>
                <button class="nav-tab" onclick="showTab('bracket')">🏁 Chaveamento</button>
                <button class="nav-tab" onclick="showTab('standings')">📈 Classificação</button>
            </div>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Competitions Tab -->
        <div id="competitionsTab">
            <div class="card">
                <h2 class="card-title">Criar Nova Competição</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome da Competição</label>
                        <input type="text" id="competitionName" placeholder="Ex: Copa do Mundo">
                    </div>
                    <div class="form-group">
                        <label>Temporada</label>
                        <input type="text" id="competitionSeason" placeholder="Ex: 2024">
                    </div>
                    <div class="form-group">
                        <label>Modelo de Disputa</label>
                        <select id="competitionFormat" onchange="toggleFormatOptions()">
                            <option value="">Selecione o formato...</option>
                            <option value="LEAGUE">Pontos Corridos</option>
                            <option value="LEAGUE_HOME_AWAY">Turno e Returno</option>
                            <option value="GROUPS">Fase de Grupos</option>
                            <option value="GROUPS_KNOCKOUT">Grupos + Mata-Mata</option>
                            <option value="KNOCKOUT">Mata-Mata (Eliminatório)</option>
                        </select>
                    </div>
                </div>

                <div id="formatOptions"></div>

                <div class="form-group">
                    <button class="btn btn-primary" onclick="createCompetition()">Criar Competição</button>
                </div>

                <h3 style="margin-top: 30px; margin-bottom: 20px; color: #1e3c72;">Competições Existentes</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Competição</th>
                                <th>Temporada</th>
                                <th>Formato</th>
                                <th>Times</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="competitionsList"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Teams Tab -->
        <div id="teamsTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Gerenciar Times</h2>
                
                <div class="form-group">
                    <label>Selecione a Competição</label>
                    <select id="teamCompetitionSelect" onchange="loadTeams()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="teamFormSection" class="hidden">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nome do Time</label>
                            <input type="text" id="teamName" placeholder="Ex: Brasil">
                        </div>
                        <div class="form-group">
                            <label>Sigla (3 letras)</label>
                            <input type="text" id="teamAbbreviation" maxlength="3" placeholder="Ex: BRA">
                        </div>
                        <div class="form-group">
                            <label>Ranking (para cabeça de chave)</label>
                            <input type="number" id="teamRanking" placeholder="Ex: 1" min="1" value="999">
                        </div>
                        <div class="form-group" style="justify-content: flex-end;">
                            <button class="btn btn-primary" onclick="createTeam()">Adicionar Time</button>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Sigla</th>
                                <th>Ranking</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="teamsList"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Groups Tab -->
        <div id="groupsTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Gerenciar Grupos</h2>
                
                <div class="form-group">
                    <label>Selecione a Competição</label>
                    <select id="groupCompetitionSelect" onchange="loadGroups()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="groupsContent"></div>
            </div>
        </div>

        <!-- Matches Tab -->
        <div id="matchesTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Gerenciar Partidas</h2>
                
                <div class="form-group">
                    <label>Selecione a Competição</label>
                    <select id="matchCompetitionSelect" onchange="loadMatches()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="matchesContent"></div>
            </div>
        </div>

        <!-- Bracket Tab -->
        <div id="bracketTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Chaveamento Mata-Mata</h2>
                
                <div class="form-group">
                    <label>Selecione a Competição</label>
                    <select id="bracketCompetitionSelect" onchange="loadBracket()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="bracketContent"></div>
            </div>
        </div>

        <!-- Standings Tab -->
        <div id="standingsTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Classificação</h2>
                
                <div class="form-group">
                    <label>Selecione a Competição</label>
                    <select id="standingsCompetitionSelect" onchange="loadStandings()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="standingsContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ============ DATABASE SIMULATION ============
        const DB = {
            get: (key) => JSON.parse(localStorage.getItem(key) || '[]'),
            set: (key, data) => localStorage.setItem(key, JSON.stringify(data)),
            
            // Competitions
            getCompetitions: () => DB.get('competitions'),
            saveCompetition: (competition) => {
                const competitions = DB.getCompetitions();
                competition.id = Date.now().toString();
                competition.createdAt = new Date().toISOString();
                competitions.push(competition);
                DB.set('competitions', competitions);
                return competition;
            },
            updateCompetition: (id, updates) => {
                const competitions = DB.getCompetitions();
                const index = competitions.findIndex(c => c.id === id);
                if (index !== -1) {
                    competitions[index] = { ...competitions[index], ...updates };
                    DB.set('competitions', competitions);
                }
            },
            deleteCompetition: (id) => {
                const competitions = DB.getCompetitions().filter(c => c.id !== id);
                DB.set('competitions', competitions);
                DB.set('teams_' + id, []);
                DB.set('matches_' + id, []);
                DB.set('groups_' + id, []);
                DB.set('knockout_' + id, []);
            },
            
            // Teams
            getTeams: (competitionId) => DB.get('teams_' + competitionId),
            saveTeam: (competitionId, team) => {
                const teams = DB.getTeams(competitionId);
                team.id = Date.now().toString() + Math.random();
                teams.push(team);
                DB.set('teams_' + competitionId, teams);
                return team;
            },
            deleteTeam: (competitionId, teamId) => {
                const teams = DB.getTeams(competitionId).filter(t => t.id !== teamId);
                DB.set('teams_' + competitionId, teams);
            },
            
            // Groups
            getGroups: (competitionId) => DB.get('groups_' + competitionId),
            saveGroups: (competitionId, groups) => DB.set('groups_' + competitionId, groups),
            
            // Matches
            getMatches: (competitionId) => DB.get('matches_' + competitionId),
            saveMatches: (competitionId, matches) => DB.set('matches_' + competitionId, matches),
            updateMatch: (competitionId, matchId, updates) => {
                const matches = DB.getMatches(competitionId);
                const index = matches.findIndex(m => m.id === matchId);
                if (index !== -1) {
                    matches[index] = { ...matches[index], ...updates };
                    DB.set('matches_' + competitionId, matches);
                }
            },
            
            // Knockout
            getKnockout: (competitionId) => DB.get('knockout_' + competitionId),
            saveKnockout: (competitionId, knockout) => DB.set('knockout_' + competitionId, knockout)
        };

        // ============ UTILITY FUNCTIONS ============
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            alert.textContent = message;
            container.appendChild(alert);
            
            setTimeout(() => alert.remove(), 4000);
        }

        function showTab(tabName) {
            document.querySelectorAll('[id$="Tab"]').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(tabName + 'Tab').classList.remove('hidden');
            
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            // Load data for the tab
            if (tabName === 'competitions') loadCompetitions();
            if (tabName === 'teams') loadCompetitionSelects();
            if (tabName === 'groups') loadCompetitionSelects();
            if (tabName === 'matches') loadCompetitionSelects();
            if (tabName === 'bracket') loadCompetitionSelects();
            if (tabName === 'standings') loadCompetitionSelects();
        }

        function toggleFormatOptions() {
            const format = document.getElementById('competitionFormat').value;
            const container = document.getElementById('formatOptions');
            
            const options = {
                'LEAGUE': `
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Número de Turnos</label>
                            <input type="number" id="leagueTurns" value="1" min="1" max="4">
                        </div>
                    </div>
                `,
                'LEAGUE_HOME_AWAY': `
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Turno e Returno automático</label>
                            <p style="color: #666; margin-top: 8px;">Todos os times se enfrentam 2 vezes (casa e fora)</p>
                        </div>
                    </div>
                `,
                'GROUPS': `
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Número de Grupos</label>
                            <input type="number" id="numGroups" value="4" min="2" max="16">
                        </div>
                        <div class="form-group">
                            <label>Classificados por Grupo</label>
                            <input type="number" id="qualifiedPerGroup" value="2" min="1" max="4">
                        </div>
                    </div>
                `,
                'GROUPS_KNOCKOUT': `
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Número de Grupos</label>
                            <input type="number" id="numGroups" value="4" min="2" max="16">
                        </div>
                        <div class="form-group">
                            <label>Classificados por Grupo</label>
                            <input type="number" id="qualifiedPerGroup" value="2" min="1" max="4">
                        </div>
                        <div class="form-group">
                            <label>Fase Mata-Mata</label>
                            <p style="color: #666; margin-top: 8px;">Classificados avançam para eliminatórias</p>
                        </div>
                    </div>
                `,
                'KNOCKOUT': `
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Usar Cabeças de Chave?</label>
                            <select id="useSeeding">
                                <option value="true">Sim - Ranking define confrontos</option>
                                <option value="false">Não - Sorteio aleatório</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Jogos de Ida e Volta?</label>
                            <select id="homeAndAway">
                                <option value="false">Jogo único</option>
                                <option value="true">Ida e Volta</option>
                            </select>
                        </div>
                    </div>
                `
            };
            
            container.innerHTML = options[format] || '';
        }

        // ============ COMPETITION FUNCTIONS ============
        function createCompetition() {
            const name = document.getElementById('competitionName').value;
            const season = document.getElementById('competitionSeason').value;
            const format = document.getElementById('competitionFormat').value;
            
            if (!name || !season || !format) {
                showAlert('Preencha todos os campos!', 'error');
                return;
            }
            
            const competition = {
                name,
                season,
                format,
                config: {}
            };
            
            // Get format-specific config
            if (format === 'LEAGUE') {
                competition.config.turns = parseInt(document.getElementById('leagueTurns')?.value || '1');
            } else if (format === 'GROUPS' || format === 'GROUPS_KNOCKOUT') {
                competition.config.numGroups = parseInt(document.getElementById('numGroups')?.value || '4');
                competition.config.qualifiedPerGroup = parseInt(document.getElementById('qualifiedPerGroup')?.value || '2');
            } else if (format === 'KNOCKOUT') {
                competition.config.useSeeding = document.getElementById('useSeeding')?.value === 'true';
                competition.config.homeAndAway = document.getElementById('homeAndAway')?.value === 'true';
            }
            
            DB.saveCompetition(competition);
            showAlert('Competição criada com sucesso!');
            
            document.getElementById('competitionName').value = '';
            document.getElementById('competitionSeason').value = '';
            document.getElementById('competitionFormat').value = '';
            document.getElementById('formatOptions').innerHTML = '';
            
            loadCompetitions();
        }

        function loadCompetitions() {
            const competitions = DB.getCompetitions();
            const tbody = document.getElementById('competitionsList');
            
            if (competitions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Nenhuma competição cadastrada</td></tr>';
                return;
            }
            
            tbody.innerHTML = competitions.map(comp => {
                const teams = DB.getTeams(comp.id);
                const formatNames = {
                    'LEAGUE': 'Pontos Corridos',
                    'LEAGUE_HOME_AWAY': 'Turno e Returno',
                    'GROUPS': 'Fase de Grupos',
                    'GROUPS_KNOCKOUT': 'Grupos + Mata-Mata',
                    'KNOCKOUT': 'Mata-Mata'
                };
                
                return `
                    <tr>
                        <td><strong>${comp.name}</strong></td>
                        <td>${comp.season}</td>
                        <td><span class="badge badge-info">${formatNames[comp.format]}</span></td>
                        <td>${teams.length} times</td>

        // ============ GENERATE MATCHES ============
        function generateMatches(competitionId) {
            const competition = DB.getCompetitions().find(c => c.id === competitionId);
            const teams = DB.getTeams(competitionId);
            
            if (teams.length < 2) {
                showAlert('Adicione pelo menos 2 times!', 'error');
                return;
            }
            
            let matches = [];
            
            if (competition.format === 'LEAGUE') {
                matches = generateLeagueMatches(teams, competition.config.turns || 1);
            } else if (competition.format === 'LEAGUE_HOME_AWAY') {
                matches = generateLeagueMatches(teams, 2);
            } else if (competition.format === 'GROUPS' || competition.format === 'GROUPS_KNOCKOUT') {
                matches = generateGroupStageMatches(competition, teams);
            } else if (competition.format === 'KNOCKOUT') {
                generateKnockoutBracket(competition, teams);
                showAlert('Chaveamento gerado com sucesso!');
                loadCompetitions();
                return;
            }
            
            DB.saveMatches(competitionId, matches);
            showAlert(`${matches.length} partidas geradas com sucesso!`);
            loadCompetitions();
        }

        function generateLeagueMatches(teams, turns) {
            const matches = [];
            
            for (let turn = 0; turn < turns; turn++) {
                for (let i = 0; i < teams.length; i++) {
                    for (let j = i + 1; j < teams.length; j++) {
                        const homeTeam = turn % 2 === 0 ? teams[i] : teams[j];
                        const awayTeam = turn % 2 === 0 ? teams[j] : teams[i];
                        
                        matches.push({
                            id: Date.now() + Math.random() + matches.length,
                            homeTeamId: homeTeam.id,
                            awayTeamId: awayTeam.id,
                            homeScore: null,
                            awayScore: null,
                            status: 'SCHEDULED',
                            round: turn + 1,
                            group: null,
                            date: new Date().toISOString()
                        });
                    }
                }
            }
            
            return matches;
        }

        function generateGroupStageMatches(competition, teams) {
            const numGroups = competition.config.numGroups;
            const teamsPerGroup = Math.ceil(teams.length / numGroups);
            
            // Sort teams by ranking for seeding
            teams.sort((a, b) => (a.ranking || 999) - (b.ranking || 999));
            
            // Distribute teams into groups
            const groups = [];
            for (let i = 0; i < numGroups; i++) {
                groups[i] = [];
            }
            
            teams.forEach((team, index) => {
                const groupIndex = index % numGroups;
                groups[groupIndex].push(team);
            });
            
            DB.saveGroups(competition.id, groups);
            
            // Generate matches within each group
            const matches = [];
            groups.forEach((groupTeams, groupIndex) => {
                for (let i = 0; i < groupTeams.length; i++) {
                    for (let j = i + 1; j < groupTeams.length; j++) {
                        matches.push({
                            id: Date.now() + Math.random() + matches.length,
                            homeTeamId: groupTeams[i].id,
                            awayTeamId: groupTeams[j].id,
                            homeScore: null,
                            awayScore: null,
                            status: 'SCHEDULED',
                            round: 1,
                            group: groupIndex,
                            date: new Date().toISOString()
                        });
                    }
                }
            });
            
            return matches;
        }

        function generateKnockoutBracket(competition, teams) {
            const useSeeding = competition.config.useSeeding;
            const homeAndAway = competition.config.homeAndAway;
            
            // Sort by ranking if using seeding
            if (useSeeding) {
                teams.sort((a, b) => (a.ranking || 999) - (b.ranking || 999));
            } else {
                // Random shuffle
                teams = teams.sort(() => Math.random() - 0.5);
            }
            
            // Calculate bracket size (power of 2)
            const bracketSize = Math.pow(2, Math.ceil(Math.log2(teams.length)));
            const numRounds = Math.log2(bracketSize);
            
            // Pad with BYEs if necessary
            while (teams.length < bracketSize) {
                teams.push({ id: 'BYE', name: 'BYE', abbreviation: 'BYE', isBye: true });
            }
            
            const bracket = {
                rounds: [],
                homeAndAway: homeAndAway
            };
            
            // Create first round matches
            const firstRoundMatches = [];
            for (let i = 0; i < bracketSize / 2; i++) {
                const match = {
                    id: Date.now() + Math.random() + i,
                    homeTeamId: teams[i * 2].id,
                    awayTeamId: teams[i * 2 + 1].id,
                    homeScore: null,
                    awayScore: null,
                    homeScore2: homeAndAway ? null : undefined,
                    awayScore2: homeAndAway ? null : undefined,
                    status: 'SCHEDULED',
                    round: 1,
                    matchNumber: i,
                    winner: null,
                    isBye: teams[i * 2].isBye || teams[i * 2 + 1].isBye
                };
                
                // Auto-advance BYE matches
                if (match.isBye) {
                    match.status = 'FINISHED';
                    match.winner = teams[i * 2].isBye ? teams[i * 2 + 1].id : teams[i * 2].id;
                }
                
                firstRoundMatches.push(match);
            }
            
            bracket.rounds.push(firstRoundMatches);
            
            // Create subsequent rounds
            for (let round = 2; round <= numRounds; round++) {
                const matchesInRound = bracketSize / Math.pow(2, round);
                const roundMatches = [];
                
                for (let i = 0; i < matchesInRound; i++) {
                    roundMatches.push({
                        id: Date.now() + Math.random() + i + round * 1000,
                        homeTeamId: null,
                        awayTeamId: null,
                        homeScore: null,
                        awayScore: null,
                        homeScore2: homeAndAway ? null : undefined,
                        awayScore2: homeAndAway ? null : undefined,
                        status: 'PENDING',
                        round: round,
                        matchNumber: i,
                        winner: null,
                        previousMatches: [i * 2, i * 2 + 1]
                    });
                }
                
                bracket.rounds.push(roundMatches);
            }
            
            DB.saveKnockout(competition.id, bracket);
            DB.saveMatches(competition.id, []); // Clear regular matches
        }
