<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ligas Esportivas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header h1 span {
            color: #667eea;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .nav-tab:hover {
            background: #e0e0e0;
        }

        .nav-tab.active {
            background: #667eea;
            color: white;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .score-input {
            width: 70px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }

        .match-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-name {
            font-weight: 600;
            font-size: 18px;
        }

        .match-score {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .match-score span {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .match-status {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .hidden {
            display: none !important;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .select-competition {
            margin-bottom: 20px;
        }

        .points-badge {
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
            }
            
            .match-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .team-info {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚽ <span>Sistema de Ligas</span> Esportivas</h1>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="showTab('competitions')">Competições</button>
                <button class="nav-tab" onclick="showTab('teams')">Times</button>
                <button class="nav-tab" onclick="showTab('matches')">Partidas</button>
                <button class="nav-tab" onclick="showTab('standings')">Classificação</button>
            </div>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Competitions Tab -->
        <div id="competitionsTab">
            <div class="card">
                <h2 class="card-title">Gerenciar Competições</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome da Competição</label>
                        <input type="text" id="competitionName" placeholder="Ex: Campeonato Brasileiro">
                    </div>
                    <div class="form-group">
                        <label>Temporada</label>
                        <input type="text" id="competitionSeason" placeholder="Ex: 2024">
                    </div>
                    <div class="form-group" style="justify-content: flex-end;">
                        <button class="btn btn-primary" onclick="createCompetition()">Criar Competição</button>
                    </div>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Temporada</th>
                                <th>Times</th>
                                <th>Partidas</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="competitionsList"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Teams Tab -->
        <div id="teamsTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Gerenciar Times</h2>
                
                <div class="form-group select-competition">
                    <label>Selecione a Competição</label>
                    <select id="teamCompetitionSelect" onchange="loadTeams()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="teamFormSection" class="hidden">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nome do Time</label>
                            <input type="text" id="teamName" placeholder="Ex: Flamengo">
                        </div>
                        <div class="form-group">
                            <label>Sigla (3 letras)</label>
                            <input type="text" id="teamAbbreviation" maxlength="3" placeholder="Ex: FLA">
                        </div>
                        <div class="form-group" style="justify-content: flex-end;">
                            <button class="btn btn-primary" onclick="createTeam()">Adicionar Time</button>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Sigla</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="teamsList"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Matches Tab -->
        <div id="matchesTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Gerenciar Partidas</h2>
                
                <div class="form-group select-competition">
                    <label>Selecione a Competição</label>
                    <select id="matchCompetitionSelect" onchange="loadMatchForm()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="matchFormSection" class="hidden">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Time da Casa</label>
                            <select id="homeTeamSelect"></select>
                        </div>
                        <div class="form-group">
                            <label>Time Visitante</label>
                            <select id="awayTeamSelect"></select>
                        </div>
                        <div class="form-group" style="justify-content: flex-end;">
                            <button class="btn btn-primary" onclick="createMatch()">Agendar Partida</button>
                        </div>
                    </div>
                </div>

                <div id="matchesList"></div>
            </div>
        </div>

        <!-- Standings Tab -->
        <div id="standingsTab" class="hidden">
            <div class="card">
                <h2 class="card-title">Classificação</h2>
                
                <div class="form-group select-competition">
                    <label>Selecione a Competição</label>
                    <select id="standingsCompetitionSelect" onchange="loadStandings()">
                        <option value="">Selecione uma competição...</option>
                    </select>
                </div>

                <div id="standingsContent"></div>
            </div>
        </div>
    </div>

    <script>
        // Database simulation using localStorage
        const DB = {
            get: (key) => JSON.parse(localStorage.getItem(key) || '[]'),
            set: (key, data) => localStorage.setItem(key, JSON.stringify(data)),
            
            // Competitions
            getCompetitions: () => DB.get('competitions'),
            saveCompetition: (competition) => {
                const competitions = DB.getCompetitions();
                competition.id = Date.now().toString();
                competitions.push(competition);
                DB.set('competitions', competitions);
                return competition;
            },
            deleteCompetition: (id) => {
                const competitions = DB.getCompetitions().filter(c => c.id !== id);
                DB.set('competitions', competitions);
                // Delete related data
                DB.set('teams_' + id, []);
                DB.set('matches_' + id, []);
            },
            
            // Teams
            getTeams: (competitionId) => DB.get('teams_' + competitionId),
            saveTeam: (competitionId, team) => {
                const teams = DB.getTeams(competitionId);
                team.id = Date.now().toString();
                teams.push(team);
                DB.set('teams_' + competitionId, teams);
                return team;
            },
            deleteTeam: (competitionId, teamId) => {
                const teams = DB.getTeams(competitionId).filter(t => t.id !== teamId);
                DB.set('teams_' + competitionId, teams);
            },
            
            // Matches
            getMatches: (competitionId) => DB.get('matches_' + competitionId),
            saveMatch: (competitionId, match) => {
                const matches = DB.getMatches(competitionId);
                match.id = Date.now().toString();
                matches.push(match);
                DB.set('matches_' + competitionId, matches);
                return match;
            },
            updateMatch: (competitionId, matchId, updates) => {
                const matches = DB.getMatches(competitionId);
                const index = matches.findIndex(m => m.id === matchId);
                if (index !== -1) {
                    matches[index] = { ...matches[index], ...updates };
                    DB.set('matches_' + competitionId, matches);
                }
            },
            deleteMatch: (competitionId, matchId) => {
                const matches = DB.getMatches(competitionId).filter(m => m.id !== matchId);
                DB.set('matches_' + competitionId, matches);
            }
        };

        // Utility Functions
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            alert.textContent = message;
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 3000);
        }

        function showTab(tabName) {
            // Hide all tabs
            document.getElementById('competitionsTab').classList.add('hidden');
            document.getElementById('teamsTab').classList.add('hidden');
            document.getElementById('matchesTab').classList.add('hidden');
            document.getElementById('standingsTab').classList.add('hidden');
            
            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.remove('hidden');
            
            // Update active tab button
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Load data for the tab
            if (tabName === 'competitions') loadCompetitions();
            if (tabName === 'teams') loadCompetitionSelects();
            if (tabName === 'matches') loadCompetitionSelects();
            if (tabName === 'standings') loadCompetitionSelects();
        }

        // Competition Functions
        function createCompetition() {
            const name = document.getElementById('competitionName').value;
            const season = document.getElementById('competitionSeason').value;
            
            if (!name || !season) {
                showAlert('Preencha todos os campos!', 'error');
                return;
            }
            
            const competition = DB.saveCompetition({ name, season });
            showAlert('Competição criada com sucesso!');
            document.getElementById('competitionName').value = '';
            document.getElementById('competitionSeason').value = '';
            loadCompetitions();
        }

        function loadCompetitions() {
            const competitions = DB.getCompetitions();
            const tbody = document.getElementById('competitionsList');
            
            if (competitions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Nenhuma competição cadastrada</td></tr>';
                return;
            }
            
            tbody.innerHTML = competitions.map(comp => {
                const teams = DB.getTeams(comp.id);
                const matches = DB.getMatches(comp.id);
                
                return `
                    <tr>
                        <td><strong>${comp.name}</strong></td>
                        <td>${comp.season}</td>
                        <td><span class="badge badge-info">${teams.length} times</span></td>
                        <td><span class="badge badge-success">${matches.length} partidas</span></td>
                        <td class="action-buttons">
                            <button class="btn btn-primary btn-sm" onclick="selectCompetition('${comp.id}')">Selecionar</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCompetition('${comp.id}')">Excluir</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function selectCompetition(id) {
            localStorage.setItem('selectedCompetition', id);
            showAlert('Competição selecionada!');
            showTab('teams');
        }

        function deleteCompetition(id) {
            if (confirm('Tem certeza que deseja excluir esta competição? Todos os times e partidas serão excluídos.')) {
                DB.deleteCompetition(id);
                loadCompetitions();
                showAlert('Competição excluída com sucesso!');
            }
        }

        // Team Functions
        function loadCompetitionSelects() {
            const competitions = DB.getCompetitions();
            const options = competitions.map(c => `<option value="${c.id}">${c.name} - ${c.season}</option>`).join('');
            
            document.getElementById('teamCompetitionSelect').innerHTML = 
                '<option value="">Selecione uma competição...</option>' + options;
            document.getElementById('matchCompetitionSelect').innerHTML = 
                '<option value="">Selecione uma competição...</option>' + options;
            document.getElementById('standingsCompetitionSelect').innerHTML = 
                '<option value="">Selecione uma competição...</option>' + options;
            
            const selectedId = localStorage.getItem('selectedCompetition');
            if (selectedId) {
                document.getElementById('teamCompetitionSelect').value = selectedId;
                document.getElementById('matchCompetitionSelect').value = selectedId;
                document.getElementById('standingsCompetitionSelect').value = selectedId;
            }
        }

        function loadTeams() {
            const select = document.getElementById('teamCompetitionSelect');
            const competitionId = select.value;
            
            if (!competitionId) {
                document.getElementById('teamFormSection').classList.add('hidden');
                document.getElementById('teamsList').innerHTML = '';
                return;
            }
            
            document.getElementById('teamFormSection').classList.remove('hidden');
            const teams = DB.getTeams(competitionId);
            const tbody = document.getElementById('teamsList');
            
            if (teams.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 40px;">Nenhum time cadastrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = teams.map(team => `
                <tr>
                    <td><strong>${team.name}</strong></td>
                    <td><span class="badge badge-info">${team.abbreviation}</span></td>
                    <td class="action-buttons">
                        <button class="btn btn-danger btn-sm" onclick="deleteTeam('${competitionId}', '${team.id}')">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        function createTeam() {
            const competitionId = document.getElementById('teamCompetitionSelect').value;
            const name = document.getElementById('teamName').value;
            const abbreviation = document.getElementById('teamAbbreviation').value.toUpperCase();
            
            if (!competitionId || !name || !abbreviation) {
                showAlert('Preencha todos os campos!', 'error');
                return;
            }
            
            if (abbreviation.length !== 3) {
                showAlert('A sigla deve ter 3 letras!', 'error');
                return;
            }
            
            const teams = DB.getTeams(competitionId);
            if (teams.some(t => t.abbreviation === abbreviation)) {
                showAlert('Esta sigla já está em uso!', 'error');
                return;
            }
            
            DB.saveTeam(competitionId, { name, abbreviation });
            showAlert('Time adicionado com sucesso!');
            document.getElementById('teamName').value = '';
            document.getElementById('teamAbbreviation').value = '';
            loadTeams();
            loadCompetitions();
        }

        function deleteTeam(competitionId, teamId) {
            if (confirm('Tem certeza que deseja excluir este time?')) {
                DB.deleteTeam(competitionId, teamId);
                loadTeams();
                loadCompetitions();
                showAlert('Time excluído com sucesso!');
            }
        }

        // Match Functions
        function loadMatchForm() {
            const competitionId = document.getElementById('matchCompetitionSelect').value;
            
            if (!competitionId) {
                document.getElementById('matchFormSection').classList.add('hidden');
                document.getElementById('matchesList').innerHTML = '';
                return;
            }
            
            document.getElementById('matchFormSection').classList.remove('hidden');
            
            const teams = DB.getTeams(competitionId);
            const options = teams.map(t => `<option value="${t.id}">${t.name} (${t.abbreviation})</option>`).join('');
            
            document.getElementById('homeTeamSelect').innerHTML = options;
            document.getElementById('awayTeamSelect').innerHTML = options;
            
            loadMatches();
        }

        function createMatch() {
            const competitionId = document.getElementById('matchCompetitionSelect').value;
            const homeTeamId = document.getElementById('homeTeamSelect').value;
            const awayTeamId = document.getElementById('awayTeamSelect').value;
            
            if (!competitionId || !homeTeamId || !awayTeamId) {
                showAlert('Selecione os times!', 'error');
                return;
            }
            
            if (homeTeamId === awayTeamId) {
                showAlert('Os times devem ser diferentes!', 'error');
                return;
            }
            
            const match = {
                homeTeamId,
                awayTeamId,
                homeScore: null,
                awayScore: null,
                status: 'SCHEDULED',
                date: new Date().toISOString()
            };
            
            DB.saveMatch(competitionId, match);
            showAlert('Partida agendada com sucesso!');
            loadMatches();
            loadCompetitions();
        }

        function loadMatches() {
            const competitionId = document.getElementById('matchCompetitionSelect').value;
            const matches = DB.getMatches(competitionId);
            const teams = DB.getTeams(competitionId);
            const container = document.getElementById('matchesList');
            
            if (matches.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">Nenhuma partida agendada</div>';
                return;
            }
            
            container.innerHTML = matches.map(match => {
                const homeTeam = teams.find(t => t.id === match.homeTeamId);
                const awayTeam = teams.find(t => t.id === match.awayTeamId);
                
                if (!homeTeam || !awayTeam) return '';
                
                const statusClass = {
                    'SCHEDULED': 'badge-warning',
                    'IN_PROGRESS': 'badge-info',
                    'FINISHED': 'badge-success'
                }[match.status] || 'badge-info';
                
                const statusText = {
                    'SCHEDULED': 'Agendada',
                    'IN_PROGRESS': 'Em Andamento',
                    'FINISHED': 'Finalizada'
                }[match.status] || match.status;
                
                return `
                    <div class="match-row">
                        <div class="team-info">
                            <div class="team-name">${homeTeam.name}</div>
                            <span class="badge badge-info">${homeTeam.abbreviation}</span>
                        </div>
                        
                        <div style="text-align: center;">
                            ${match.status === 'SCHEDULED' ? `
                                <div class="match-score">
                                    <input type="number" class="score-input" id="home_${match.id}" placeholder="0" min="0">
                                    <span>×</span>
                                    <input type="number" class="score-input" id="away_${match.id}" placeholder="0" min="0">
                                </div>
                                <button class="btn btn-success btn-sm" style="margin-top: 10px;" onclick="updateScore('${match.id}')">
                                    Registrar Placar
                                </button>
                            ` : match.status === 'FINISHED' ? `
                                <div class="match-score">
                                    <span>${match.homeScore}</span>
                                    <span>×</span>
                                    <span>${match.awayScore}</span>
                                </div>
                            ` : `
                                <div class="match-score">
                                    <span>${match.homeScore || 0}</span>
                                    <span>×</span>
                                    <span>${match.awayScore || 0}</span>
                                </div>
                                <button class="btn btn-primary btn-sm" style="margin-top: 10px;" onclick="finishMatch('${match.id}')">
                                    Finalizar Partida
                                </button>
                            `}
                            <div class="match-status">
                                <span class="badge ${statusClass}">${statusText}</span>
                            </div>
                        </div>
                        
                        <div class="team-info" style="justify-content: flex-end;">
                            <span class="badge badge-info">${awayTeam.abbreviation}</span>
                            <div class="team-name">${awayTeam.name}</div>
                        </div>
                        
                        <button class="btn btn-danger btn-sm" style="position: absolute; top: 10px; right: 10px;" 
                                onclick="deleteMatch('${match.id}')">×</button>
                    </div>
                `;
            }).join('');
        }

        function updateScore(matchId) {
            const competitionId = document.getElementById('matchCompetitionSelect').value;
            const homeScore = parseInt(document.getElementById(`home_${matchId}`).value) || 0;
            const awayScore = parseInt(document.getElementById(`away_${matchId}`).value) || 0;
            
            DB.updateMatch(competitionId, matchId, {
                homeScore,
                awayScore,
                status: 'FINISHED'
            });
            
            showAlert('Placar registrado com sucesso!');
            loadMatches();
            loadCompetitions();
        }

        function finishMatch(matchId) {
            const competitionId = document.getElementById('matchCompetitionSelect').value;
            
            DB.updateMatch(competitionId, matchId, {
                status: 'FINISHED'
            });
            
            showAlert('Partida finalizada!');
            loadMatches();
        }

        function deleteMatch(matchId) {
            const competitionId = document.getElementById('matchCompetitionSelect').value;
            
            if (confirm('Tem certeza que deseja excluir esta partida?')) {
                DB.deleteMatch(competitionId, matchId);
                loadMatches();
                loadCompetitions();
                showAlert('Partida excluída com sucesso!');
            }
        }

        // Standings Functions
        function loadStandings() {
            const competitionId = document.getElementById('standingsCompetitionSelect').value;
            
            if (!competitionId) {
                document.getElementById('standingsContent').innerHTML = '';
                return;
            }
            
            const teams = DB.getTeams(competitionId);
            const matches = DB.getMatches(competitionId).filter(m => m.status === 'FINISHED');
            
            // Calculate standings
            const standings = teams.map(team => {
                let points = 0;
                let played = 0;
                let won = 0;
                let drawn = 0;
                let lost = 0;
                let goalsFor = 0;
                let goalsAgainst = 0;
                
                matches.forEach(match => {
                    if (match.homeTeamId === team.id) {
                        played++;
                        goalsFor += match.homeScore || 0;
                        goalsAgainst += match.awayScore || 0;
                        
                        if (match.homeScore > match.awayScore) {
                            won++;
                            points += 3;
                        } else if (match.homeScore === match.awayScore) {
                            drawn++;
                            points += 1;
                        } else {
                            lost++;
                        }
                    } else if (match.awayTeamId === team.id) {
                        played++;
                        goalsFor += match.awayScore || 0;
                        goalsAgainst += match.homeScore || 0;
                        
                        if (match.awayScore > match.homeScore) {
                            won++;
                            points += 3;
                        } else if (match.awayScore === match.homeScore) {
                            drawn++;
                            points += 1;
                        } else {
                            lost++;
                        }
                    }
                });
                
                return {
                    ...team,
                    points,
                    played,
                    won,
                    drawn,
                    lost,
                    goalsFor,
                    goalsAgainst,
                    goalDifference: goalsFor - goalsAgainst
                };
            });
            
            // Sort standings
            standings.sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                if (b.won !== a.won) return b.won - a.won;
                if (b.goalDifference !== a.goalDifference) return b.goalDifference - a.goalDifference;
                return b.goalsFor - a.goalsFor;
            });
            
            const container = document.getElementById('standingsContent');
            
            if (standings.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">Nenhum time cadastrado</div>';
                return;
            }
            
            // Stats cards
            const totalMatches = matches.length;
            const totalGoals = matches.reduce((sum, m) => sum + (m.homeScore || 0) + (m.awayScore || 0), 0);
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${standings.length}</div>
                        <div class="stat-label">Times</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${totalMatches}</div>
                        <div class="stat-label">Partidas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${totalGoals}</div>
                        <div class="stat-label">Gols</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(totalGoals / totalMatches || 0).toFixed(2)}</div>
                        <div class="stat-label">Média de Gols</div>
                    </div>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Time</th>
                                <th>P</th>
                                <th>J</th>
                                <th>V</th>
                                <th>E</th>
                                <th>D</th>
                                <th>GP</th>
                                <th>GC</th>
                                <th>SG</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${standings.map((team, index) => `
                                <tr>
                                    <td><strong>${index + 1}º</strong></td>
                                    <td>
                                        <strong>${team.name}</strong>
                                        <span class="badge badge-info" style="margin-left: 10px;">${team.abbreviation}</span>
                                    </td>
                                    <td><span class="points-badge">${team.points}</span></td>
                                    <td>${team.played}</td>
                                    <td>${team.won}</td>
                                    <td>${team.drawn}</td>
                                    <td>${team.lost}</td>
                                    <td>${team.goalsFor}</td>
                                    <td>${team.goalsAgainst}</td>
                                    <td>${team.goalDifference > 0 ? '+' : ''}${team.goalDifference}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCompetitions();
            
            // Initialize with sample data if empty
            if (DB.getCompetitions().length === 0) {
                const comp = DB.saveCompetition({ name: 'Campeonato Brasileiro', season: '2024' });
                DB.saveTeam(comp.id, { name: 'Flamengo', abbreviation: 'FLA' });
                DB.saveTeam(comp.id, { name: 'Palmeiras', abbreviation: 'PAL' });
                DB.saveTeam(comp.id, { name: 'São Paulo', abbreviation: 'SAO' });
                DB.saveTeam(comp.id, { name: 'Corinthians', abbreviation: 'COR' });
                showAlert('Sistema inicializado com dados de exemplo!');
                loadCompetitions();
            }
        });
    </script>
</body>
</html>
